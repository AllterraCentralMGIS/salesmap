<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <title>SalesMap</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Auth gate -->
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-card">
      <h1>SalesMap</h1>
      <div class="auth-sub">Sign in to access your team's customer map.</div>
      <form id="authForm">
        <div class="form-row">
          <label>Email</label>
          <input type="email" id="authEmail" autocomplete="email" required />
        </div>
        <div class="form-row" id="authPasswordRow">
          <label>Password</label>
          <input type="password" id="authPassword" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="authSubmit">Sign in</button>
      </form>
      <div class="auth-footnote">
        First time? Use the temporary password from your invite email; you'll be prompted to set a new one.
        <br/>Forgot your password? <a href="#" id="authForgot">Email me a reset link</a>.
      </div>
      <div id="authMsg" class="auth-msg"></div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>SalesMap</h1>
        <div class="sidebar-actions">
          <button id="btnNewCustomer" title="Add a new customer">+ New</button>
          <button id="btnSettings" title="Settings">⚙</button>
          <button id="btnSignOut" title="Sign out">⎋</button>
          <button id="btnSidebarClose" class="phone-only" title="Back to map">×</button>
        </div>
      </div>

      <div class="filters">
        <input type="search" id="search" placeholder="Search company, contact, city…" />
        <div class="filter-row">
          <select id="filterZone"><option value="">All zones</option></select>
          <select id="filterSalesperson"><option value="">All salespeople</option></select>
        </div>
        <div class="filter-row">
          <select id="filterRecency">
            <option value="">Any recency</option>
            <option value="never">Never visited</option>
            <option value="90">Not visited in 90+ days</option>
            <option value="60">Not visited in 60+ days</option>
            <option value="30">Not visited in 30+ days</option>
            <option value="recent">Visited in last 30 days</option>
          </select>
          <select id="filterVisitor">
            <option value="">All visitors</option>
          </select>
        </div>
        <div class="counts" id="counts"></div>
      </div>

      <ul id="customerList"></ul>
    </aside>

    <main id="mapWrap">
      <div id="map"></div>
      <div id="legend">
        <div class="legend-title">Last visit</div>
        <div><span class="dot dot-never"></span> Never visited</div>
        <div><span class="dot dot-stale"></span> 90+ days</div>
        <div><span class="dot dot-mid"></span> 30–90 days</div>
        <div><span class="dot dot-fresh"></span> Under 30 days</div>
      </div>

      <!-- Phone: floating buttons -->
      <button id="phoneListBtn" class="phone-fab" title="List">≡</button>
      <button id="recenterBtn" class="recenter-fab" title="Fit map to all customers">⤢</button>
    </main>

    <aside id="detail" class="hidden">
      <div class="detail-header">
        <button class="close" id="detailClose">×</button>
      </div>
      <div id="detailBody"></div>
    </aside>
  </div>

  <!-- Modals -->
  <div id="modalRoot"></div>

  <!-- Toast / progress -->
  <div id="toast" class="hidden"></div>

  <!-- External libraries -->
  <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps-web.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson@7.1.0/dist/togeojson.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.2.0/turf.min.js"></script>

  <!-- App -->
  <script src="config.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
